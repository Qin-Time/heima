<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <script>
    let uname = prompt('请输入你的名字：');    //将用户输入的信息赋值给变量name
    let age = prompt('请输入你的年龄：');    //将用户输入的信息赋值给变量age
    let gender = prompt('请输入你的性别：');    //将用户输入的信息赋值给变量gender
    document.write('用户名：' + uname + '，年龄：' + age + '，性别：' + gender);  //控制台输出变量name、age和gender的值


    document.write('努力' + '奋斗')
    console.log('努力' + age.concat(gender))

  </script>
</body>

</html>
