<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>

  <script>
  // 输入输出语句：输入语句是指从用户那里获取数据的语句，输出语句是指将数据输出到控制台或者页面上的语句。
  // 输入语句：prompt()函数可以用来获取用户输入的数据，prompt()函数会弹出一个对话框，用户在对话框中输入数据后，点击确定按钮，prompt()函数会返回用户输入的数据。
  // 输出语句：alert()函数可以用来将数据输出到页面上，alert()函数会弹出一个对话框，显示alert()函数的参数值，用户点击确定按钮后，对话框会关闭。
  // 输入输出语句的作用：输入输出语句可以用来与用户进行交互，获取用户输入的数据，并将数据输出到页面上，增强用户体验。
  // 输入输出语句的使用：输入输出语句的使用非常简单，只需要调用相应的函数，并传入需要输入或者输出的数据即可。
  // 输入输出语句的注意事项：输入输出语句会阻塞页面的渲染，所以在使用输入输出语句时，要注意不要在页面加载过程中使用输入输出语句，否则会造成页面加载慢，影响用户体验。 
  // 输入输出语句的总结：输入输出语句是JS中非常重要的一部分，输入输出语句可以用来与用户进行交互，获取用户输入的数据，并将数据输出到页面上，增强用户体验。在使用输入输出语句时，要注意不要在页面加载过程中使用输入输出语句，否则会造成页面加载慢，影响用户体验。 -->
  prompt('请输入你的名字：');     //页面弹窗输入语句

  alert('输入输出语句的作用：输入输出语句可以用来与用户进行交互，获取用户输入的数据，并将数据输出到页面上，增强用户体验。');    //页面弹窗输出语句

  document.write('输入输出语句的注意事项：输入输出语句会阻塞页面的渲染，所以在使用输入输出语句时，要注意不要在页面加载过程中使用输入输出语句，否则会造成页面加载慢，影响用户体验。');    //页面文档输出语句

  console.log('输入输出语句的使用：输入输出语句的使用非常简单，只需要调用相应的函数，并传入需要输入或者输出的数据即可。');    //控制台输出语句

  </script>
 
</body>
</html>
