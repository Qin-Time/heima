<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <script>
    // 变量：变量是用来存储数据的容器，变量可以存储各种类型的数据，包括字符串、数字、布尔值、对象等。变量的作用是用来存储数据，方便我们在程序中使用和操作数据。
    // 变量的声明：在JS中，变量的声明可以使用var、let和const三种关键字，var是ES5中声明变量的方式，let和const是ES6中声明变量的方式。var声明的变量具有函数作用域，let和const声明的变量具有块级作用域。const声明的变量必须初始化，并且不能被重新赋值。
    // 变量的命名：变量的命名规则是：变量名必须以字母、下划线或者美元符号开头，后面可以跟字母、数字、下划线或者美元符号。变量名不能是JS的保留字，变量名区分大小写。变量名应该具有描述性，能够清晰地表达变量的含义。
    // 变量的使用：变量的使用非常简单，只需要使用变量名即可访问变量存储的数据。变量可以用来存储各种类型的数据，包括字符串、数字、布尔值、对象等。变量可以用来进行各种操作，包括算术运算、字符串拼接、逻辑运算等。
    // 变量的总结：变量是用来存储数据的容器，变量可以存储各种类型的数据，包括字符串、数字、布尔值、对象等。变量的作用是用来存储数据，方便我们在程序中使用和操作数据。在JS中，变量的声明可以使用var、let和const三种关键字，var是ES5中声明变量的方式，let和const是ES6中声明变量的方式。var声明的变量具有函数作用域，let和const声明的变量具有块级作用域。const声明的变量必须初始化，并且不能被重新赋值。变量的命名规则是：变量名必须以字母、下划线或者美元符号开头，后面可以跟字母、数字、下划线或者美元符号。变量名不能是JS的保留字，变量名区分大小写。变量名应该具有描述性，能够清晰地表达变量的含义。变量的使用非常简单，只需要使用变量名即可访问变量存储的数据。变量可以用来存储各种类型的数据，包括字符串、数字、布尔值、对象等。变量可以用来进行各种操作，包括算术运算、字符串拼接、逻辑运算等。
    let num = 20;
    let uname = '张三';
    console.log(num);    //控制台输出变量num的值  
    console.log(uname);  //控制台输出变量uname的值  
    // 1.用户输入信息
    
    // 2.将用户的信息赋值给变量
    let name = prompt('请输入你的名字：');    //将用户输入的信息赋值给变量name
    // 3.输出变量
    document.write(name);  //控制台输出变量name的值
  </script>
</body>

</html>
