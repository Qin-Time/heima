<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <!-- 外部引入JS代码 -->
  <!-- 外部引入JS代码的方式：在html文件中通过<script>标签的src属性引入外部的JS文件，src属性的值是外部JS文件的路径。 -->
  <!-- 外部引入JS代码的好处：1. 可以将JS代码和HTML代码分离，增强代码的可维护性；2. 可以复用JS代码，提高开发效率；3. 可以减少HTML文件的大小，提高页面加载速度。 -->
  <script src="new.js"></script>

</body>
</html>
