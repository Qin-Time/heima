<!DOCTYPE html>

<body>
  <script>
    //Math.random() 方法，返回0-1之间随机小数，包括0不包括1
    console.log(Math.random());
    //生成0-10的随机数
    Math.floor(Math.random() * (10 + 1));
    //生成5-10的随机数
    Math.floor(Math.random() * (5 + 1)) + 5
    //生成N-M的随机数
    // let random2 = Math.floor(Math.random() * (M - N + 1)) + N

    //将N-M封装成一个函数以供调用
    function getRandom(N, M) {
      return Math.floor(Math.random() * (M - N + 1)) + N
    }

    //生成0-length的随机数以供数组使用
    function getRandomIndex(length) {
      // 生成 0 到 length (不包含 length，即length-1,不会越界) 的随机整数
      return Math.floor(Math.random() * length);
    }


  </script>
</body>
