<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    h2 {
      /* 设置标题样式 */
      text-align: center;
    }

    table {
      /* 设置表格样式 */
      border-collapse: collapse;
      /* 设置表格重复边框消除 */
      margin: auto;
      /* 设置表格外边距，即居中 */
    }

    td {
      /* 设置单元格样式 */
      border: 2px solid black;
      padding: 10px 10px;
      /* 设置单元格内边距 */
      text-align: center;
      /* 设置文字居中 */
    }

    .top {
      /* 独立设置表头 */
      padding: 30px;
      margin: 20px;
    }
  </style>
</head>

<body>
  <h2>订单确认</h2>


  <script>
    //接收用户输入的数据
    let price = + prompt('请输入商品价格');//接收数据并通过+运算符隐式转换为number格式
    let num = + prompt('请输入购买数量');
    let address = prompt('请输入收货地址');
    let tolal = price * num;
    document.write(`
      <table>
        <tr>
          <td class='top line1'>商品名称</td>
          <td class='top line2'>商品价格</td>
          <td class='top line3'>商品数量</td>
          <td class='top line4'>总价</td>
          <td class='top line5'>收货地址</td>
        </tr>
        <tr>
          <td class='hang1 line1'>小米手机PLUS</td>
          <td class='hang1 line2'>${price}</td>
          <td class='hang1 line3'>${num}</td>
          <td class='hang1 line4'>${tolal}元</td>
          <td class='hang1 line5'>${address}</td>
        </tr>
        <tr>
          <td class='hang2 line1'>商品名称</td>
          <td class='hang2 line2'>商品价格</td>
          <td class='hang2 line3'>商品数量</td>
          <td class='hang2 line4'>总价</td>
          <td class='hang2 line5'>收货地址</td>
        </tr>
        <tr>
          <td class='hang3 line1'>商品名称</td>
          <td class='hang3 line2'>商品价格</td>
          <td class='hang3 line3'>商品数量</td>
          <td class='hang3 line4'>总价</td>
          <td class='hang3 line5'>收货地址</td>
        </tr>
      </table>
    `)

  </script>
</body>

</html>
